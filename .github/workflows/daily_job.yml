name: Daily Yahoo Top50 Update

# 定时触发和手动触发
on:
  schedule:
    - cron: "0 22 * * *" # 每天悉尼时间上午 9 点 (UTC+11)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取最新代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: pip install yahooquery snowflake-connector-python python-dotenv pandas

      # 4️⃣ 抓取前 50 股票数据
      - name: Fetch data from Yahoo Finance
        run: python fetch_yahoo_data.py

      # 5️⃣ 上传数据到 Snowflake
      - name: Upload data to Snowflake
        run: python upload_to_snowflake.py
